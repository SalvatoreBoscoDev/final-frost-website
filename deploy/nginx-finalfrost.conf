server {
    listen 80;
    server_name finalfrostgame.com www.finalfrostgame.com;

    root /home/marin/final-frost/frontend/dist;
    index index.html;

    # Django API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django admin static files
    location /static/ {
        alias /home/marin/final-frost/backend/staticfiles/;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
