server {
    listen 80;
    server_name finalfrostgame.com www.finalfrostgame.com;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    root /var/www/final-frost/frontend/dist;
    index index.html;

    # Django API
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django static files (admin CSS etc.)
    location /static/ {
        alias /var/www/final-frost/backend/staticfiles/;
    }

    # React SPA — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

